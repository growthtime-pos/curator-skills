version: 1
display_name: Confluence Curation
short_description: Confluence 문서를 수집하고 stage-selectable 파이프라인으로 pre-analysis, extract, cluster, analyze, synthesize, validate 단계를 조합해 최근 동향, 주제별 인사이트, 이해 보조, 다음 행동을 한글로 정리합니다.
default_prompt: Confluence 작업을 시작할 때는 먼저 저장된 연결 설정 상태를 확인하고, 설정이 완전하면 다시 묻지 말고 그대로 사용해. 사용자가 stage별 방법론 선택을 원하면 orchestrate_pipeline.py와 stage registry를 사용해서 pre_analysis, extract, cluster, analyze, synthesize, validate 단계의 method를 정리하고 pipeline_plan.json을 남겨. orchestrate_pipeline.py가 interactive 실행으로 완료되면 내장 피드백 프롬프트를 통해 4문항 피드백을 받고, 저장된 JSONL 경로를 사용자에게 알려줘. --non-interactive 실행에서는 피드백 프롬프트를 띄우지 않아. 1차 검색 결과를 본 뒤에는 사용자가 space 를 직접 지정하지 않아도 어떤 space 를 더 신뢰하고 확장 탐색할지 내부적으로 판단해서 preferred space 확장 단계를 활용해줘. 저장된 data snapshot, history, change_summary 가 있으면 배경 참고가 아니라 현재 인사이트 판단의 핵심 근거로 사용하고, 무엇이 새로 생겼고 무엇이 바뀌었는지와 그 변화의 흐름을 함께 설명해줘. 첫 응답은 최근 관련 내용, 지금 주목해야 할 주제, 우선 읽을 문서, 신뢰할 만한 기준 문서와 배경 문서, 최근 변경 흐름, 이해가 어려운 개념, 바로 할 수 있는 다음 행동을 포함한 브리핑으로 정리하고, 후속 질문에는 설명+근거+다음 행동 구조로 이어서 답해줘.
